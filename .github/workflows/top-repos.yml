name: top-repos
on:
  schedule:
    - cron: "0 6 * * 1"   # 每周一 06:00 UTC 刷新
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["README.md", ".github/scripts/top_repos.py", ".github/workflows/top-repos.yml"]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Update top repos block
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/top_repos.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh top repos by stars"
            git push
          else
            echo "no change"
          fi
