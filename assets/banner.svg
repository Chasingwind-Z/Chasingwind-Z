<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace">
  <style>
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
    @keyframes pulse{0%,100%{r:5;opacity:1}50%{r:8;opacity:.55}}
    @keyframes sweep{0%{transform:translateX(-40px)}100%{transform:translateX(1320px)}}
    .cur{animation:blink 1.1s steps(1) infinite}
    .tw{animation:tw 2.4s ease-in-out infinite}
    .nd{animation:pulse 2.8s ease-in-out infinite}
    .scan{animation:sweep 6s linear infinite}
    .t{fill:#E6EDF3}.mut{fill:#7D8590}.pur{fill:#A78BFA}.tea{fill:#2DD4BF}.amb{fill:#F0B429}
  </style>

  <rect width="1280" height="340" rx="18" fill="#0D1117"/>
  <rect x="2" y="2" width="1276" height="336" rx="17" fill="none" stroke="#21262D" stroke-width="2"/>

  <g class="tw"><circle cx="120" cy="60" r="2.5" fill="#A78BFA"/></g>
  <g class="tw" style="animation-delay:.6s"><circle cx="1190" cy="80" r="2.5" fill="#2DD4BF"/></g>
  <g class="tw" style="animation-delay:1.1s"><circle cx="1090" cy="290" r="2.5" fill="#F0B429"/></g>
  <g class="tw" style="animation-delay:.3s"><circle cx="60" cy="280" r="2" fill="#2DD4BF"/></g>

  <rect class="scan" x="0" y="0" width="40" height="340" fill="#A78BFA" opacity="0.05"/>

  <g transform="translate(70,80)">
    <rect width="470" height="188" rx="12" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="26" cy="26" r="6" fill="#FF5F56"/><circle cx="48" cy="26" r="6" fill="#FFBD2E"/><circle cx="70" cy="26" r="6" fill="#27C93F"/>
    <text x="26" y="80" font-size="20"><tspan class="tea">$</tspan> <tspan class="t">who am i</tspan></text>
    <text x="26" y="114" font-size="20"><tspan class="mut">&#8250;</tspan> <tspan class="pur">LLM &#183; apps to infra</tspan></text>
    <text x="26" y="148" font-size="20"><tspan class="tea">$</tspan> <tspan class="t">./build</tspan> <tspan class="amb">things-that-run</tspan></text>
    <rect class="cur" x="332" y="132" width="11" height="20" fill="#E6EDF3"/>
  </g>

  <g>
    <path d="M680 115 L775 160 L880 205 L995 155 L1105 105 M880 205 L905 255" stroke="#3B4A63" stroke-width="2" fill="none" opacity="0.9"/>
    <circle class="nd" cx="605" cy="88" r="3" fill="#2DD4BF" style="animation-delay:.2s"/>
    <circle class="nd" cx="620" cy="98" r="2.5" fill="#2DD4BF" style="animation-delay:.9s"/>
    <circle class="nd" cx="598" cy="101" r="2.5" fill="#2DD4BF" style="animation-delay:1.5s"/>
    <circle class="nd" cx="680" cy="115" r="5" fill="#2DD4BF" style="animation-delay:.3s"/>
    <circle class="nd" cx="775" cy="160" r="5" fill="#A78BFA" style="animation-delay:.8s"/>
    <circle class="nd" cx="995" cy="155" r="5" fill="#A78BFA" style="animation-delay:1.3s"/>
    <circle class="nd" cx="1105" cy="105" r="5" fill="#2DD4BF" style="animation-delay:1.7s"/>
    <circle class="nd" cx="905" cy="255" r="4" fill="#A78BFA" style="animation-delay:2.1s"/>
    <circle cx="880" cy="205" r="11" fill="#F0B429" opacity="0.22"/>
    <circle cx="880" cy="205" r="7" fill="#F5B942"/>
    <text x="1118" y="256" font-size="20" fill="#7D6FB0" opacity="0.5">&#9809;</text>
  </g>

  <text x="70" y="312" font-size="34" font-weight="700" letter-spacing="2">
    <tspan class="pur">Chasingwind</tspan><tspan class="tea">-Z</tspan>
  </text>
  <text x="392" y="312" font-size="17" class="mut">building with LLMs, from apps to infra</text>
</svg>
